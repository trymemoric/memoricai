name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Existing semantic version to rebuild in the current GHCR namespace
        required: true
        type: string
      update_latest:
        description: Also update the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  ghcr-image:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version and image tags
        id: meta
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          UPDATE_LATEST: ${{ inputs.update_latest }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${REQUESTED_VERSION#v}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:$version"
            if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || "$UPDATE_LATEST" == "true" ]]; then
              echo "ghcr.io/${GITHUB_REPOSITORY}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        with:
          ref: v${{ steps.meta.outputs.version }}
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
