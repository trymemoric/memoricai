name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Existing semantic version to rebuild in the current GHCR namespace
        required: true
        type: string
      update_latest:
        description: Also update the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  ghcr-image:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version and image tags
        id: meta
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          UPDATE_LATEST: ${{ inputs.update_latest }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${REQUESTED_VERSION#v}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:$version"
            if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || "$UPDATE_LATEST" == "true" ]]; then
              echo "ghcr.io/${GITHUB_REPOSITORY}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        with:
          ref: v${{ steps.meta.outputs.version }}
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Package publishing runs only on tag pushes. The workflow_dispatch path
  # exists to rebuild an already-released Docker image; re-publishing an
  # existing npm/PyPI/crate version would fail, so it is skipped there.
  publish-npm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Verify package version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [[ "$tag" != "$pkg" ]]; then
            echo "Tag $tag does not match @memoricai/sdk version $pkg" >&2
            exit 1
          fi
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Verify package version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 -E '^version[[:space:]]*=' sdks/python/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ "$tag" != "$pkg" ]]; then
            echo "Tag $tag does not match memoricai (PyPI) version $pkg" >&2
            exit 1
          fi
      - name: Build distribution
        run: |
          python -m pip install --upgrade build
          python -m build sdks/python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-crates:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Verify workspace version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ "$tag" != "$pkg" ]]; then
            echo "Tag $tag does not match workspace version $pkg" >&2
            exit 1
          fi
      # Publish in dependency order. Since Rust 1.66, `cargo publish` waits for
      # each new version to land in the index before returning, so the client
      # publish below resolves the freshly published core.
      - name: Publish memoricai-core
        run: cargo publish --manifest-path crates/memoricai-core/Cargo.toml --locked
      - name: Publish memoricai-client
        run: cargo publish --manifest-path crates/memoricai-client/Cargo.toml --locked

  # Create the GitHub Release entry once every package has published, so the
  # Releases tab reflects each tag (previously only the git tag existed).
  github-release:
    if: github.event_name == 'push'
    needs: [ghcr-image, publish-npm, publish-pypi, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
