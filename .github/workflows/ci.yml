name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust 1.88
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Check minimum supported Rust version
        run: cargo +1.88.0 check --workspace

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: memoricai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memoricai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MEMORICAI_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/memoricai_test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Formatting
        run: cargo +stable fmt --all -- --check
      - name: Unit tests
        run: cargo +stable test --workspace --all-targets
      - name: Postgres integration tests
        run: cargo +stable test -p memoricai --test engine_e2e -- --ignored
      - name: Clippy
        run: cargo +stable clippy --workspace --all-targets --all-features -- -D warnings
      - name: Dependency audit
        run: cargo install cargo-audit --locked && cargo audit
